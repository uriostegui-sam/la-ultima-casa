server {
    listen 443 ssl;
    server_name estudiolaultimacasa.com www.estudiolaultimacasa.com;

    ssl_certificate /etc/letsencrypt/live/estudiolaultimacasa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/estudiolaultimacasa.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/backend/public;
    client_max_body_size 20M;

    # Laravel API
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Static files from Laravel public/storage
    location /storage {
        alias /var/www/backend/storage/app/public;
        try_files $uri $uri/ =404;
    }

    # Vue app (SPA)
    location / {
        root /var/www/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
