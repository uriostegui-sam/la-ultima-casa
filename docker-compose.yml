version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - ultima-casa-network

  postgres:
    image: postgres:15
    env_file:
      - ./.env.production
    environment:
      POSTGRES_DB: '${POSTGRES_DB}'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ultima-casa-network

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - ultima-casa-network

  # PHP's (Laravel) Service
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./.env.production
    depends_on:
      - postgres
    networks:
      - ultima-casa-network

  # Node's (Vue.js) Service
  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    volumes:
      - ./frontend:/var/www/frontend
      - /var/www/frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm run build"
    networks:
      - ultima-casa-network

volumes:
  postgres_data:

networks:
  ultima-casa-network:
    driver: bridge