version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend/dist:/var/www/frontend/dist
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/letsencrypt
      - ./docker/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf
    depends_on:
      - backend
    networks:
      - ultima-casa-network

  postgres:
    image: postgres:15
    env_file:
      - ./.env.production
    environment:
      POSTGRES_DB: '${POSTGRES_DB}'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ultima-casa-network

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - ultima-casa-network

  # PHP's (Laravel) Service
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./.env.production
    depends_on:
      - postgres
    networks:
      - ultima-casa-network

volumes:
  postgres_data:

networks:
  ultima-casa-network:
    driver: bridge
